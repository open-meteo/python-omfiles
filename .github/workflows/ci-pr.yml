name: PR Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  rust_tests:
    name: Rust tests (Linux Aarch64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/cache-rust-build
      - uses: ./.github/actions/install-uv
      - uses: ./.github/actions/install-python-deps
      - uses: ./.github/actions/run-cargo-tests

  build:
    needs: rust_tests
    name: Build Wheel (Linux Aarch64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/cache-rust-build
      - uses: ./.github/actions/build-wheel
        with:
          target: aarch64-unknown-linux-gnu
          args: --release --out dist
          manylinux: "2_28"
          before-script-linux: python3 -m ensurepip && cat /etc/os-release && yum install clang -y
      - uses: ./.github/actions/upload-wheels
        with:
          name: wheels-pr-linux-aarch64
          path: dist

  test:
    needs: build
    name: Test (Linux Aarch64, Python 3.12)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-uv
        with:
          python-version: "3.12"
      - uses: ./.github/actions/download-wheels
        with:
          name: wheels-pr-linux-aarch64
          path: dist
      - uses: ./.github/actions/run-python-tests
